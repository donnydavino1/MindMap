name: Build Windows exe
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyinstaller customtkinter pandas matplotlib
      - run: pyinstaller --noconfirm --onefile --windowed --collect-all customtkinter --name MindMap mind_map.py
      - uses: actions/upload-artifact@v4
        with:
          name: MindMap-windows
          path: dist/MindMap.exe
